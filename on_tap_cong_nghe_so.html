<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn tập Công nghệ số - Đại học Hải Phòng</title>
    <style>
        :root {
            --primary-color: #004a99;
            --secondary-color: #f8f9fa;
            --accent-color: #ff9800;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            border-bottom: 3px solid var(--primary-color);
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        .header h1 { color: var(--primary-color); margin: 0; font-size: 24px; }
        .header h2 { font-size: 18px; margin: 10px 0; color: #555; }

        .sticky-bar {
            position: sticky;
            top: 0;
            background: white;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .timer {
            font-size: 20px;
            font-weight: bold;
            color: var(--danger-color);
            background: #fff5f5;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--danger-color);
        }

        .question-block {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            background-color: #fff;
        }

        .question-text {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 15px;
            display: block;
        }

        .options-list {
            list-style: none;
            padding: 0;
        }

        .option-item {
            margin-bottom: 10px;
        }

        .option-item label {
            display: block;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-item label:hover {
            background-color: #f1f3f5;
            border-color: var(--primary-color);
        }

        .option-item input[type="radio"] {
            margin-right: 10px;
        }

        /* Styling for results */
        .option-item.correct label {
            background-color: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724;
            font-weight: bold;
        }

        .option-item.wrong label {
            background-color: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background-color: #003366;
        }

        #result-summary {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background: #e7f3ff;
            border-radius: 8px;
            text-align: center;
        }

        .score-circle {
            width: 100px;
            height: 100px;
            line-height: 100px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            font-size: 32px;
            margin: 0 auto 15px;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .container { padding: 15px; margin: 10px; }
            .sticky-bar { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>TRƯỜNG ĐẠI HỌC HẢI PHÒNG</h1>
        <h2>Học phần: Công nghệ số (INF762)</h2>
        <p><i>Hệ thống ôn luyện ngẫu nhiên 20 câu hỏi từ ngân hàng 120 câu</i></p>
    </div>

    <div class="sticky-bar">
        <div id="progress">Tiến độ: 0/20</div>
        <div class="timer" id="timer">20:00</div>
    </div>

    <div id="quiz-area">
        <!-- Questions will be injected here -->
    </div>

    <div id="result-summary">
        <div class="score-circle" id="score-val">0</div>
        <h3 id="score-text">Bạn đã hoàn thành bài thi!</h3>
        <p id="detail-text"></p>
        <button class="btn-submit" onclick="location.reload()" style="background: var(--accent-color);">Làm đề mới</button>
    </div>

    <button class="btn-submit" id="submit-btn" onclick="gradeQuiz()">Nộp Bài</button>
</div>

<script>
    const allQuestions = [
        // CHƯƠNG 1
        {q: "Khái niệm “xã hội số” chủ yếu tập trung vào khía cạnh nào sau đây?", a: "B", o: ["Công nghiệp 4.0 và AI.", "Công dân số và văn hóa số.", "Hệ thống giao thông thông minh.", "Toàn bộ nền kinh tế toàn cầu."]},
        {q: "Khái niệm “công dân số” được hiểu như thế nào trong bối cảnh hiện nay?", a: "C", o: ["Người chỉ dùng điện thoại thông minh.", "Người am hiểu kỹ thuật phần cứng.", "Người tham gia có trách nhiệm, tích cực, an toàn và hiệu quả trong môi trường số.", "Người có nhiều tài khoản mạng xã hội."]},
        {q: "Theo Khung năng lực số DigComp của EU, có bao nhiêu lĩnh vực năng lực số chính?", a: "B", o: ["3", "5", "7", "10"]},
        {q: "Theo Thông tư số 02/2025/TT-BGDĐT, khung năng lực số của nhà giáo nhằm mục tiêu chính là gì?", a: "C", o: ["Tăng cường khả năng sử dụng máy tính.", "Chuẩn hóa kỹ năng tin học cơ bản.", "Phát triển năng lực ứng dụng công nghệ số trong dạy học, đánh giá.", "Đào tạo giáo viên thành chuyên gia lập trình."]},
        {q: "Theo đề xuất của UNESCO, khung năng lực số được chia thành bao nhiêu nhóm năng lực chính?", a: "B", o: ["5", "7", "9", "10"]},
        {q: "Trong Khung năng lực số của UNESCO, nhóm “Giao tiếp và hợp tác số” nhấn mạnh điều gì?", a: "B", o: ["Viết mã máy tính.", "Sử dụng công cụ số để giao tiếp, cộng tác, tham gia cộng đồng.", "Tự động hóa sản xuất.", "Tăng tốc độ mạng."]},
        {q: "Theo Thông tư số 02/2025/TT-BGDĐT, Khung năng lực số được áp dụng cho đối tượng nào?", a: "C", o: ["Chỉ học sinh THPT.", "Chỉ sinh viên đại học.", "Tất cả người học trong hệ thống giáo dục quốc dân.", "Chỉ cán bộ quản lý giáo dục."]},
        {q: "Khái niệm ‘dấu chân số’ được hiểu là gì?", a: "B", o: ["Kích thước màn hình.", "Dấu vết thông tin người dùng để lại khi tham gia môi trường số.", "Tập tin hệ thống.", "Đo lường dung lượng bộ nhớ."]},
        {q: "Để trở thành công dân số có trách nhiệm, mỗi cá nhân cần rèn luyện kỹ năng nào?", a: "A", o: ["Bảo vệ quyền riêng tư và dữ liệu cá nhân.", "Sử dụng càng nhiều tài khoản càng tốt.", "Đăng tải thông tin không kiểm chứng.", "Chia sẻ mật khẩu."]},
        {q: "Một trong những lợi ích của năng lực số đối với sinh viên là?", a: "B", o: ["Giảm thi cử.", "Tăng khả năng học tập, nghiên cứu, hội nhập nghề nghiệp.", "Thoát khỏi Internet.", "Loại bỏ việc viết báo cáo."]},
        {q: "Theo Thông tư số 02/2025/TT-BGDĐT, khung năng lực số cho người học gồm bao nhiêu nhóm chính?", a: "B", o: ["5", "6", "9", "10"]},
        {q: "Theo Thông tư 02/2025/TT-BGDĐT, Khung năng lực số cho người học được chia thành bao nhiêu bậc trình độ?", a: "C", o: ["4 bậc", "6 bậc", "8 bậc", "10 bậc"]},
        {q: "Miền “Khai thác dữ liệu và thông tin” yêu cầu người học có khả năng nào?", a: "B", o: ["Tạo sản phẩm đồ họa.", "Tìm kiếm, đánh giá, quản lý và sử dụng thông tin hiệu quả.", "Lập trình phần mềm quản lý.", "Sử dụng MXH quảng bá cá nhân."]},
        {q: "Theo UNESCO, việc đánh giá năng lực số người học có thể thực hiện qua hình thức nào?", a: "B", o: ["Quan sát ngẫu nhiên.", "Tự đánh giá, bài kiểm tra lý thuyết và thực hành kỹ năng số.", "Chỉ thống kê số lượng thiết bị.", "Dựa vào mức độ dùng MXH."]},
        {q: "Công cụ “Personal Learning Network” (PLN) dùng để làm gì?", a: "B", o: ["Lưu trữ dữ liệu.", "Tạo mạng lưới học tập cá nhân trực tuyến.", "Quản lý tài chính.", "Thiết kế phần cứng."]},
        {q: "Yếu tố nào sau đây là một trong những thách thức của nền kinh tế số?", a: "B", o: ["Không cần vốn.", "Vấn đề bảo mật và bảo vệ dữ liệu cá nhân.", "Không cần nhân lực.", "Luôn có lợi nhuận."]},
        {q: "Kỹ năng số có vai trò như thế nào trong thời đại chuyển đổi số?", a: "B", o: ["Năng lực phụ trợ khi học trực tuyến.", "Năng lực cốt lõi giúp nâng cao cạnh tranh và thích ứng nghề nghiệp.", "Kỹ năng riêng của ngành CNTT.", "Năng lực tự chọn."]},
        {q: "Vì sao Việt Nam cần đẩy mạnh phát triển năng lực số trong giáo dục?", a: "C", o: ["Thay thế hoàn toàn học trực tiếp.", "Giảm chi phí đầu tư.", "Hình thành nhân lực thích ứng và làm chủ công nghệ chuyển đổi số.", "Tăng thời gian dùng thiết bị số."]},
        {q: "Mục tiêu kinh tế số Việt Nam tầm nhìn đến năm 2030 là bao nhiêu GDP?", a: "C", o: ["10% GDP", "20% GDP", "30% GDP", "50% GDP"]},
        {q: "Thông tư số 02/2025/TT-BGDĐT có hiệu lực thi hành kể từ ngày nào?", a: "B", o: ["01/03/2025", "11/03/2025", "01/05/2025", "24/01/2025"]},
        {q: "Miền “An toàn” trong Khung năng lực số hướng đến mục tiêu gì?", a: "A", o: ["Biết bảo vệ thiết bị, dữ liệu, sức khỏe và môi trường số.", "Thành thạo tạo nội dung đa phương tiện.", "Lập trình ứng dụng đơn giản.", "Sử dụng công cụ AI."]},
        {q: "Khung năng lực số người học chia thành bao nhiêu trình độ năng lực tổng thể?", a: "C", o: ["2 trình độ", "3 trình độ", "4 trình độ", "5 trình độ"]},
        {q: "Đặc trưng nổi bật của công nghệ số so với công nghệ truyền thống?", a: "C", o: ["Dựa trên năng lượng cơ học.", "Chỉ hoạt động môi trường vật lý.", "Biến đổi thông tin thành dữ liệu số để xử lý, lưu trữ.", "Phụ thuộc thủ công."]},
        {q: "Trong môi trường số, phương thức phổ biến và an toàn để xác thực danh tính là?", a: "A", o: ["Sử dụng xác thực hai yếu tố (2FA).", "Chia sẻ mật khẩu.", "Đăng nhập máy công cộng.", "Lưu mật khẩu trên giấy."]},

        // CHƯƠNG 2
        {q: "“Nhu cầu tin” được định nghĩa là gì?", a: "B", o: ["Mong muốn cập nhật tin tức hàng ngày.", "Sự thiếu hụt tri thức làm nảy sinh tâm lý tìm kiếm thông tin lấp đầy khoảng trống.", "Khả năng tìm kiếm nhanh trên Internet.", "Hành vi truy cập CSDL học thuật."]},
        {q: "Bước đầu tiên và quan trọng nhất trong xác định nhu cầu thông tin là?", a: "C", o: ["Lựa chọn công cụ tìm kiếm.", "Lên danh sách từ khóa.", "Xác định rõ chủ đề và thiết lập các câu hỏi tìm kiếm.", "Phân loại nguồn sơ cấp/thứ cấp."]},
        {q: "Nguồn thông tin sơ cấp (Primary Sources) bao gồm:", a: "B", o: ["Bách khoa toàn thư, Sách giáo trình.", "Báo cáo nghiên cứu gốc, phỏng vấn, nhật ký, hồi ký.", "Các bài báo tổng quan.", "Tạp chí khoa học đã bình duyệt."]},
        {q: "Trong “Vòng đời thông tin”, thông tin thường xuất bản đầu tiên dưới hình thức nào?", a: "C", o: ["Sách chuyên khảo.", "Tạp chí học thuật.", "Tin nhắn mạng xã hội, truyền hình, blog, báo chí.", "Bách khoa toàn thư."]},
        {q: "Công cụ nào KHÔNG tìm kiếm thông tin học thuật/nghiên cứu?", a: "D", o: ["Google, Bing.", "Scopus, Web of Science.", "Thư viện trường ĐH.", "Shopee, Lazada."]},
        {q: "Tiêu chí để đánh giá một trang web uy tín là gì?", a: "C", o: ["Giao diện đẹp.", "Đuôi .com hoặc .net.", "Có thông tin tác giả/tổ chức chịu trách nhiệm và cập nhật thường xuyên.", "Nhiều lượt truy cập và chia sẻ."]},
        {q: "Sử dụng dấu ngoặc kép (\"...\") quanh cụm từ có tác dụng gì?", a: "B", o: ["Tìm trên trang .org.", "Kết quả tìm chính xác cụm từ đó theo đúng thứ tự.", "Loại trừ trang không chứa từ khóa.", "Mở rộng sang từ đồng nghĩa."]},
        {q: "Mục tiêu chính của việc tổ chức thông tin (Information Organization) là?", a: "B", o: ["Giúp thông tin đẹp mắt.", "Phân loại, lưu trữ và tạo mối liên hệ để dễ dàng truy xuất.", "Đảm bảo tính hợp pháp.", "Cập nhật thời gian thực."]},
        {q: "Hành vi nào thể hiện sự thiếu đạo đức trong sử dụng thông tin?", a: "B", o: ["Chia sẻ trích dẫn đầy đủ.", "Sử dụng hình ảnh bản quyền thương mại không xin phép.", "Dùng Google Scholar.", "Lưu trên đám mây cá nhân."]},
        {q: "Tiêu chí Authority (Quyền uy) trong đánh giá thông tin là gì?", a: "B", o: ["Thông tin mới nhất.", "Tác giả/tổ chức có chuyên môn, bằng cấp, kinh nghiệm lĩnh vực đó.", "Mục đích để giải trí.", "Liên quan đến chủ đề nghiên cứu."]},
        {q: "Thêm từ khóa \"filetype:pdf\" vào chuỗi tìm kiếm Google có tác dụng gì?", a: "B", o: ["Tìm tài liệu sửa được.", "Giới hạn kết quả trả về là tệp định dạng PDF.", "Tìm từ khóa học thuật.", "Tìm trên trang nước ngoài."]},
        {q: "“Câu hỏi tìm kiếm thông tin” nên xây dựng theo nguyên tắc nào?", a: "B", o: ["Rộng và mơ hồ.", "Cụ thể, rõ ràng, tập trung khái niệm chính và giới hạn phạm vi.", "Chỉ gồm một từ khóa.", "Luôn là câu hỏi đóng."]},
        {q: "Nguồn thông tin cấp ba (Tertiary Sources) là gì?", a: "C", o: ["Tài liệu gốc chưa xuất bản.", "Tạp chí chuyên ngành.", "Công cụ tìm kiếm, chỉ mục, bách khoa toàn thư, thư mục tra cứu.", "Bài báo phân tích chuyên gia."]},
        {q: "Công việc Thu thập thông tin bao gồm hoạt động nào?", a: "C", o: ["Chỉ lưu đường link bookmark.", "Sao chép toàn bộ dán vào Word.", "Xác định nguồn tiềm năng, chọn công cụ phù hợp và thực hiện chiến lược tìm.", "Đánh giá chính xác và kịp thời."]},

        {q: "Sử dụng công cụ trực quan hóa dữ liệu (Data Visualization) nhằm mục đích gì?", a: "B", o: ["Thay thế văn bản giải thích.", "Giúp xử lý dữ liệu phức tạp dễ hơn, nổi bật xu hướng.", "Đảm bảo tính hợp pháp.", "Giới hạn phạm vi tìm kiếm."]},
        {q: "Ví dụ nào về Vòng đời thông tin đúng nhất?", a: "C", o: ["Twitter -> Tạp chí học thuật -> Bách khoa toàn thư.", "Sách giáo trình -> Luận văn -> Báo cáo.", "Sơ cấp -> Thứ cấp -> Cấp ba.", "Tìm kiếm -> Đánh giá -> Sử dụng."]},

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

            const labels = ['A', 'B', 'C', 'D'];

                optionsHtml += `

                            ${labels[oIdx]}. ${opt}

            });

            block.innerHTML = `
                <span class="question-text">Câu ${index + 1}: ${item.q}</span>
                <ul class="options-list">${optionsHtml}</ul>
            `;
            quizArea.appendChild(block);
        });

        startTimer();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                gradeQuiz();
            }
            timeLeft--;
        }, 1000);
    }

    function updateProgress() {
        const answered = document.querySelectorAll('input[type="radio"]:checked').length;
        document.getElementById('progress').innerText = `Tiến độ: ${answered}/20`;
    }

    function gradeQuiz() {
        clearInterval(timerInterval);
        let score = 0;
        
        quizSet.forEach((item, index) => {
            const selected = document.querySelector(`input[name="question-${index}"]:checked`);
            const correctLabel = item.a;
            
            // Mark correct answer
            document.getElementById(`opt-${index}-${correctLabel}`).classList.add('correct');
            
            if (selected) {
                if (selected.value === item.a) {
                    score++;
                } else {
                    document.getElementById(`opt-${index}-${selected.value}`).classList.add('wrong');
                }
            }
        });

        // Show result summary
        document.getElementById('quiz-area').style.opacity = '0.6';
        document.getElementById('submit-btn').style.display = 'none';
        
        const summary = document.getElementById('result-summary');
        summary.style.display = 'block';
        
        const finalScore = (score / 20) * 10;
        document.getElementById('score-val').innerText = score;
        document.getElementById('detail-text').innerText = `Bạn trả lời đúng ${score}/20 câu. Điểm hệ 10: ${finalScore.toFixed(2)}`;
        
        if (finalScore >= 8) {
            document.getElementById('score-text').innerText = "Xuất sắc! Bạn đã nắm vững kiến thức.";
        } else if (finalScore >= 5) {
            document.getElementById('score-text').innerText = "Đạt! Hãy ôn tập thêm để có điểm cao hơn.";
        } else {
            document.getElementById('score-text').innerText = "Cần cố gắng hơn! Hãy xem lại các đáp án sai.";
        }
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.onload = initQuiz;
</script>

</body>
</html>
